services:
  a0-orchestrator:
    build: .
    container_name: counteragent-a0-orchestrator
    restart: unless-stopped
    ports:
      - "3001:3000"
      - "127.0.0.1:5001:5000"
    volumes:
      - ./agents/a0-orchestrator/workspace:/root/.openclaw/workspace
      - ./agents/a0-orchestrator/openclaw.json:/root/.openclaw/openclaw.json:ro
    environment:
      - AGENT_NAME=a0-orchestrator
      - AGENT_ROLE=counteragent-app-facing-orchestrator
      - A2A_PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN_A0}
    networks: [agents]

  a1-monitor:
    build: .
    container_name: counteragent-a1-monitor
    restart: unless-stopped
    ports:
      - "3002:3000"
      - "127.0.0.1:5002:5000"
    volumes:
      - ./agents/a1-monitor/workspace:/root/.openclaw/workspace
      - ./agents/a1-monitor/openclaw.json:/root/.openclaw/openclaw.json:ro
    environment:
      - AGENT_NAME=a1-monitor
      - A2A_PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN_A1}
    networks: [agents]

  a2-decision:
    build: .
    container_name: counteragent-a2-decision
    restart: unless-stopped
    ports:
      - "3003:3000"
      - "127.0.0.1:5003:5000"
    volumes:
      - ./agents/a2-decision/config:/root/.openclaw
      - ./agents/a2-decision/workspace:/root/.openclaw/workspace
    environment:
      - AGENT_NAME=a2-decision
      - A2A_PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN_A2}
    networks: [agents]

  a3-execution:
    build: .
    container_name: counteragent-a3-execution
    restart: unless-stopped
    ports:
      - "3004:3000"
      - "127.0.0.1:5004:5000"
    volumes:
      - ./agents/a3-execution/config:/root/.openclaw
      - ./agents/a3-execution/workspace:/root/.openclaw/workspace
    environment:
      - AGENT_NAME=a3-execution
      - A2A_PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN_A3}
    networks: [agents]

  decision-scoring-plugin:
    build: ./agents/a2-decision/Plugin-CounterAgent-DecisionScoring
    container_name: counteragent-decision-scoring-plugin
    restart: unless-stopped
    environment:
      - PORT=8790
      - CORS_ORIGIN=https://counteragent.netlify.app,https://counteragent.perkos.xyz,https://orchestrator.counteragent.perkos.xyz
      - DECISION_MIN_CONFIDENCE=70
      - DECISION_DEFAULT_BASELINE_RATE=1.0000
    networks: [agents]

  gensyn-axl-messaging-plugin:
    build: ./agents/a0-orchestrator/Plugin-Gensyn-AXL-AgentMessaging
    container_name: counteragent-gensyn-axl-messaging-plugin
    restart: unless-stopped
    environment:
      - PORT=8792
      - CORS_ORIGIN=https://counteragent.netlify.app,https://counteragent.perkos.xyz,https://orchestrator.counteragent.perkos.xyz
      - GENSYN_AXL_MODE=adapter
      - GENSYN_AXL_NODE_URL=${GENSYN_AXL_NODE_URL:-}
      - GENSYN_AXL_AGENT_ID=counteragent-a0
    networks: [agents]

  axl-a0-transport:
    build: ./Gensyn/Plugin-Gensyn-AXL-Transport
    container_name: counteragent-axl-a0-transport
    restart: unless-stopped
    environment:
      - PORT=8890
      - CORS_ORIGIN=https://counteragent.netlify.app,https://counteragent.perkos.xyz,https://orchestrator.counteragent.perkos.xyz
      - AXL_AGENT_ID=A0-Orchestrator
      - AXL_AGENT_ROLE=A0
      - AXL_MODE=${AXL_MODE:-local}
      - AXL_NODE_URL=${AXL_A0_NODE_URL:-}
      - AXL_REQUIRE_REAL_NODE=${AXL_REQUIRE_REAL_NODE:-false}
      - AXL_PEER_A0=${AXL_PEER_A0:-counteragent-a0}
      - AXL_PEER_A1=${AXL_PEER_A1:-counteragent-a1}
      - AXL_PEER_A2=${AXL_PEER_A2:-counteragent-a2}
      - AXL_PEER_A3=${AXL_PEER_A3:-counteragent-a3}
      - AXL_PEER_A4=${AXL_PEER_A4:-counteragent-a4}
      - AXL_LOCAL_A0_URL=http://axl-a0-transport:8890
      - AXL_LOCAL_A1_URL=http://axl-a1-transport:8891
      - AXL_LOCAL_A2_URL=http://axl-a2-transport:8892
      - AXL_LOCAL_A3_URL=http://axl-a3-transport:8893
      - AXL_LOCAL_A4_URL=http://axl-a4-transport:8894
      - AXL_SERVICE_A2_URL=http://decision-scoring-plugin:8790/mcp
      - AXL_SERVICE_A3_URL=http://uniswap-swap-plugin:8791/mcp
      - AXL_SERVICE_A4_URL=http://reporting-plugin:8789/mcp
    networks: [agents]

  axl-a1-transport:
    build: ./Gensyn/Plugin-Gensyn-AXL-Transport
    container_name: counteragent-axl-a1-transport
    restart: unless-stopped
    environment:
      - PORT=8891
      - CORS_ORIGIN=https://counteragent.netlify.app,https://counteragent.perkos.xyz,https://monitor.counteragent.perkos.xyz
      - AXL_AGENT_ID=A1-Monitor
      - AXL_AGENT_ROLE=A1
      - AXL_MODE=${AXL_MODE:-local}
      - AXL_NODE_URL=${AXL_A1_NODE_URL:-}
      - AXL_REQUIRE_REAL_NODE=${AXL_REQUIRE_REAL_NODE:-false}
      - AXL_PEER_A0=${AXL_PEER_A0:-counteragent-a0}
      - AXL_PEER_A1=${AXL_PEER_A1:-counteragent-a1}
      - AXL_PEER_A2=${AXL_PEER_A2:-counteragent-a2}
      - AXL_PEER_A3=${AXL_PEER_A3:-counteragent-a3}
      - AXL_PEER_A4=${AXL_PEER_A4:-counteragent-a4}
      - AXL_LOCAL_A0_URL=http://axl-a0-transport:8890
      - AXL_LOCAL_A1_URL=http://axl-a1-transport:8891
      - AXL_LOCAL_A2_URL=http://axl-a2-transport:8892
      - AXL_LOCAL_A3_URL=http://axl-a3-transport:8893
      - AXL_LOCAL_A4_URL=http://axl-a4-transport:8894
    networks: [agents]

  axl-a2-transport:
    build: ./Gensyn/Plugin-Gensyn-AXL-Transport
    container_name: counteragent-axl-a2-transport
    restart: unless-stopped
    environment:
      - PORT=8892
      - CORS_ORIGIN=https://counteragent.netlify.app,https://counteragent.perkos.xyz,https://decision.counteragent.perkos.xyz
      - AXL_AGENT_ID=A2-Decision
      - AXL_AGENT_ROLE=A2
      - AXL_MODE=${AXL_MODE:-local}
      - AXL_NODE_URL=${AXL_A2_NODE_URL:-}
      - AXL_REQUIRE_REAL_NODE=${AXL_REQUIRE_REAL_NODE:-false}
      - AXL_PEER_A0=${AXL_PEER_A0:-counteragent-a0}
      - AXL_PEER_A1=${AXL_PEER_A1:-counteragent-a1}
      - AXL_PEER_A2=${AXL_PEER_A2:-counteragent-a2}
      - AXL_PEER_A3=${AXL_PEER_A3:-counteragent-a3}
      - AXL_PEER_A4=${AXL_PEER_A4:-counteragent-a4}
      - AXL_LOCAL_A0_URL=http://axl-a0-transport:8890
      - AXL_LOCAL_A1_URL=http://axl-a1-transport:8891
      - AXL_LOCAL_A2_URL=http://axl-a2-transport:8892
      - AXL_LOCAL_A3_URL=http://axl-a3-transport:8893
      - AXL_LOCAL_A4_URL=http://axl-a4-transport:8894
      - AXL_SERVICE_A2_URL=http://decision-scoring-plugin:8790/mcp
    networks: [agents]

  axl-a3-transport:
    build: ./Gensyn/Plugin-Gensyn-AXL-Transport
    container_name: counteragent-axl-a3-transport
    restart: unless-stopped
    environment:
      - PORT=8893
      - CORS_ORIGIN=https://counteragent.netlify.app,https://counteragent.perkos.xyz,https://execution.counteragent.perkos.xyz
      - AXL_AGENT_ID=A3-Uniswap-SwapExecution
      - AXL_AGENT_ROLE=A3
      - AXL_MODE=${AXL_MODE:-local}
      - AXL_NODE_URL=${AXL_A3_NODE_URL:-}
      - AXL_REQUIRE_REAL_NODE=${AXL_REQUIRE_REAL_NODE:-false}
      - AXL_PEER_A0=${AXL_PEER_A0:-counteragent-a0}
      - AXL_PEER_A1=${AXL_PEER_A1:-counteragent-a1}
      - AXL_PEER_A2=${AXL_PEER_A2:-counteragent-a2}
      - AXL_PEER_A3=${AXL_PEER_A3:-counteragent-a3}
      - AXL_PEER_A4=${AXL_PEER_A4:-counteragent-a4}
      - AXL_LOCAL_A0_URL=http://axl-a0-transport:8890
      - AXL_LOCAL_A1_URL=http://axl-a1-transport:8891
      - AXL_LOCAL_A2_URL=http://axl-a2-transport:8892
      - AXL_LOCAL_A3_URL=http://axl-a3-transport:8893
      - AXL_LOCAL_A4_URL=http://axl-a4-transport:8894
      - AXL_SERVICE_A3_URL=http://uniswap-swap-plugin:8791/mcp
    networks: [agents]

  axl-a4-transport:
    build: ./Gensyn/Plugin-Gensyn-AXL-Transport
    container_name: counteragent-axl-a4-transport
    restart: unless-stopped
    environment:
      - PORT=8894
      - CORS_ORIGIN=https://counteragent.netlify.app,https://counteragent.perkos.xyz,https://reporting.counteragent.perkos.xyz
      - AXL_AGENT_ID=A4-Reporting
      - AXL_AGENT_ROLE=A4
      - AXL_MODE=${AXL_MODE:-local}
      - AXL_NODE_URL=${AXL_A4_NODE_URL:-}
      - AXL_REQUIRE_REAL_NODE=${AXL_REQUIRE_REAL_NODE:-false}
      - AXL_PEER_A0=${AXL_PEER_A0:-counteragent-a0}
      - AXL_PEER_A1=${AXL_PEER_A1:-counteragent-a1}
      - AXL_PEER_A2=${AXL_PEER_A2:-counteragent-a2}
      - AXL_PEER_A3=${AXL_PEER_A3:-counteragent-a3}
      - AXL_PEER_A4=${AXL_PEER_A4:-counteragent-a4}
      - AXL_LOCAL_A0_URL=http://axl-a0-transport:8890
      - AXL_LOCAL_A1_URL=http://axl-a1-transport:8891
      - AXL_LOCAL_A2_URL=http://axl-a2-transport:8892
      - AXL_LOCAL_A3_URL=http://axl-a3-transport:8893
      - AXL_LOCAL_A4_URL=http://axl-a4-transport:8894
      - AXL_SERVICE_A4_URL=http://reporting-plugin:8789/mcp
    networks: [agents]

  ipfs-pinata-plugin:
    build: ./agents/openclaw/plugins/Plugin-IPFS-Pinata
    container_name: counteragent-ipfs-pinata-plugin
    restart: unless-stopped
    environment:
      - PORT=8793
      - CORS_ORIGIN=https://counteragent.netlify.app,https://counteragent.perkos.xyz,https://orchestrator.counteragent.perkos.xyz
      - PINATA_JWT=${PINATA_JWT}
      - PINATA_GATEWAY_URL=${PINATA_GATEWAY_URL:-https://gateway.pinata.cloud/ipfs}
      - IPFS_UPLOAD_MAX_BYTES=${IPFS_UPLOAD_MAX_BYTES:-10000000}
    networks: [agents]

  uniswap-swap-plugin:
    build: ./agents/a3-execution/Plugin-Uniswap-SwapExecution
    container_name: counteragent-uniswap-swap-plugin
    restart: unless-stopped
    environment:
      - PORT=8791
      - CORS_ORIGIN=https://counteragent.netlify.app,https://counteragent.perkos.xyz,https://orchestrator.counteragent.perkos.xyz
      - EXECUTION_MODE=${A3_EXECUTION_MODE:-dry-run}
      - UNISWAP_QUOTE_MODE=api-first
      - CHAIN_ID=${A3_CHAIN_ID:-84532}
      - BASE_RPC_URL=${BASE_RPC_URL:-https://sepolia.base.org}
      - UNISWAP_API_URL=https://trade-api.gateway.uniswap.org/v1
      - UNISWAP_API_KEY=${UNISWAP_API_KEY:-}
      - UNISWAP_RETRY_COUNT=2
      - UNISWAP_TIMEOUT_MS=10000
      - USDC_TOKEN_ADDRESS_84532=${USDC_TOKEN_ADDRESS_84532:-}
      - EURC_TOKEN_ADDRESS_84532=${EURC_TOKEN_ADDRESS_84532:-}
      - USDT_TOKEN_ADDRESS_84532=${USDT_TOKEN_ADDRESS_84532:-}
      - KEEPERHUB_API_URL=${KEEPERHUB_API_URL:-}
      - KEEPERHUB_API_KEY=${KEEPERHUB_API_KEY:-}
      - TREASURY_VAULT_FACTORY_ADDRESS=${TREASURY_VAULT_FACTORY_ADDRESS:-0x6FBbFb4F41b2366B10b93bae5D1a1A4aC3c734BA}
      - UNIVERSAL_ROUTER_ADDRESS_84532=${UNIVERSAL_ROUTER_ADDRESS_84532:-}
      - EXECUTOR_PRIVATE_KEY=${A3_EXECUTOR_PRIVATE_KEY:-}
    networks: [agents]

  a4-reporting:
    build: .
    container_name: counteragent-a4-reporting
    restart: unless-stopped
    ports:
      - "3005:3000"
      - "127.0.0.1:5005:5000"
    volumes:
      - ./agents/a4-reporting/workspace:/root/.openclaw/workspace
      - ./agents/a4-reporting/openclaw.json:/root/.openclaw/openclaw.json:ro
    environment:
      - AGENT_NAME=a4-reporting
      - A2A_PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN_A4}
    networks: [agents]

  reverse-proxy:
    image: caddy:2-alpine
    container_name: counteragent-reverse-proxy
    restart: unless-stopped
    depends_on:
      - a0-orchestrator
      - decision-scoring-plugin
      - gensyn-axl-messaging-plugin
      - axl-a0-transport
      - axl-a1-transport
      - axl-a2-transport
      - axl-a3-transport
      - axl-a4-transport
      - uniswap-swap-plugin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [agents]

networks:
  agents:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
