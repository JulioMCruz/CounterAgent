services:
  a0-orchestrator:
    build: .
    container_name: counteragent-a0-orchestrator
    restart: unless-stopped
    ports:
      - "3001:3000"
      - "127.0.0.1:5001:5000"
    volumes:
      - ./agents/a0-orchestrator/workspace:/root/.openclaw/workspace
      - ./agents/a0-orchestrator/openclaw.json:/root/.openclaw/openclaw.json:ro
    environment:
      - AGENT_NAME=a0-orchestrator
      - AGENT_ROLE=counteragent-app-facing-orchestrator
      - A2A_PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN_A0}
    networks: [agents]

  a1-monitor:
    build: .
    container_name: counteragent-a1-monitor
    restart: unless-stopped
    ports:
      - "3002:3000"
      - "127.0.0.1:5002:5000"
    volumes:
      - ./agents/a1-monitor/workspace:/root/.openclaw/workspace
      - ./agents/a1-monitor/openclaw.json:/root/.openclaw/openclaw.json:ro
    environment:
      - AGENT_NAME=a1-monitor
      - A2A_PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN_A1}
    networks: [agents]

  a2-decision:
    build: .
    container_name: counteragent-a2-decision
    restart: unless-stopped
    ports:
      - "3003:3000"
      - "127.0.0.1:5003:5000"
    volumes:
      - ./agents/a2-decision/config:/root/.openclaw
      - ./agents/a2-decision/workspace:/root/.openclaw/workspace
    environment:
      - AGENT_NAME=a2-decision
      - A2A_PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN_A2}
    networks: [agents]

  a3-execution:
    build: .
    container_name: counteragent-a3-execution
    restart: unless-stopped
    ports:
      - "3004:3000"
      - "127.0.0.1:5004:5000"
    volumes:
      - ./agents/a3-execution/config:/root/.openclaw
      - ./agents/a3-execution/workspace:/root/.openclaw/workspace
    environment:
      - AGENT_NAME=a3-execution
      - A2A_PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN_A3}
    networks: [agents]

  decision-scoring-plugin:
    build: ./agents/a2-decision/Plugin-CounterAgent-DecisionScoring
    container_name: counteragent-decision-scoring-plugin
    restart: unless-stopped
    environment:
      - PORT=8790
      - CORS_ORIGIN=https://counteragent.netlify.app,https://counteragent.perkos.xyz,https://orchestrator.counteragent.perkos.xyz
      - DECISION_MIN_CONFIDENCE=70
      - DECISION_DEFAULT_BASELINE_RATE=1.0000
    networks: [agents]

  gensyn-axl-messaging-plugin:
    build: ./agents/a0-orchestrator/Plugin-Gensyn-AXL-AgentMessaging
    container_name: counteragent-gensyn-axl-messaging-plugin
    restart: unless-stopped
    environment:
      - PORT=8792
      - CORS_ORIGIN=https://counteragent.netlify.app,https://counteragent.perkos.xyz,https://orchestrator.counteragent.perkos.xyz
      - GENSYN_AXL_MODE=adapter
      - GENSYN_AXL_NODE_URL=${GENSYN_AXL_NODE_URL:-}
      - GENSYN_AXL_AGENT_ID=counteragent-a0
    networks: [agents]

  uniswap-swap-plugin:
    build: ./agents/a3-execution/Plugin-Uniswap-SwapExecution
    container_name: counteragent-uniswap-swap-plugin
    restart: unless-stopped
    environment:
      - PORT=8791
      - CORS_ORIGIN=https://counteragent.netlify.app,https://counteragent.perkos.xyz,https://orchestrator.counteragent.perkos.xyz
      - EXECUTION_MODE=dry-run
      - CHAIN_ID=8453
      - BASE_RPC_URL=${BASE_RPC_URL:-https://mainnet.base.org}
      - UNISWAP_API_URL=https://trade-api.gateway.uniswap.org/v1
      - UNISWAP_API_KEY=${UNISWAP_API_KEY:-}
      - UNISWAP_RETRY_COUNT=2
      - UNISWAP_TIMEOUT_MS=10000
      - KEEPERHUB_API_URL=${KEEPERHUB_API_URL:-}
      - KEEPERHUB_API_KEY=${KEEPERHUB_API_KEY:-}
      - EXECUTOR_PRIVATE_KEY=${A3_EXECUTOR_PRIVATE_KEY:-}
    networks: [agents]

  a4-reporting:
    build: .
    container_name: counteragent-a4-reporting
    restart: unless-stopped
    ports:
      - "3005:3000"
      - "127.0.0.1:5005:5000"
    volumes:
      - ./agents/a4-reporting/workspace:/root/.openclaw/workspace
      - ./agents/a4-reporting/openclaw.json:/root/.openclaw/openclaw.json:ro
    environment:
      - AGENT_NAME=a4-reporting
      - A2A_PORT=5000
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - OPENCLAW_TOKEN=${OPENCLAW_TOKEN_A4}
    networks: [agents]

  reverse-proxy:
    image: caddy:2-alpine
    container_name: counteragent-reverse-proxy
    restart: unless-stopped
    depends_on:
      - a0-orchestrator
      - decision-scoring-plugin
      - gensyn-axl-messaging-plugin
      - uniswap-swap-plugin
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    networks: [agents]

networks:
  agents:
    driver: bridge

volumes:
  caddy_data:
  caddy_config:
